<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Carter's K9 Academy</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    font-family:Arial, Helvetica, sans-serif;
    background:#ffffff;
    color:#222;
}

/* Top Background Image */
.hero{
    width:100%;
    height:60vh;
    background:url("IMG_7220.png") center center/cover no-repeat;
}

/* Pricing Section */
.pricing{
    width:100%;
    padding:50px 15px;
    text-align:center;
}

.pricing h2{
    font-size:2rem;
    margin-bottom:25px;
}

.pricing img{
    width:100%;
    max-width:900px;
    height:auto;
    display:block;
    margin:auto;
}

/* Mobile */
@media(max-width:768px){

.hero{
    height:45vh;
}

.pricing h2{
    font-size:1.6rem;
}

}
</style>

</head>

<body>

<div class="hero"></div>

<section class="pricing">
    <h2>Training Programs &amp; Pricing</h2>

    <img src="IMG_7444.png" alt="Training Programs & Pricing">

</section>

</body>
</html>
